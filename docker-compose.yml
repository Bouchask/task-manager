version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: task_user
      DB_PASSWORD: task_password
    depends_on:
      - db
    volumes:
      - ./app:/var/www/html

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tasks
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
      - name: mysql
        image: mariadb:10.11
        env:
        - name: MARIADB_DATABASE
          value: tasks
        - name: MARIADB_USER
          value: task_user
        - name: MARIADB_PASSWORD
          value: task_password
        - name: MARIADB_ROOT_PASSWORD
          value: root_password
        ports:
        - containerPort: 3306
